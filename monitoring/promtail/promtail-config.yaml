server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${GRAFANA_LOKI_URL}
    basic_auth:
      username: ${GRAFANA_LOKI_USERNAME}
      password: ${GRAFANA_LOKI_API_KEY}

scrape_configs:
  # Scrape SkynetBot application logs
  - job_name: skynetbot
    static_configs:
      - targets:
          - localhost
        labels:
          job: skynetbot
          __path__: /var/log/skynetbot/*.skynetbot.log
    
    pipeline_stages:
      # Parse JSON logs from Winston
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            label: label
      
      # Extract timestamp
      - timestamp:
          source: timestamp
          format: "02-01-2006 15:04:05"
      
      # Set log level as label
      - labels:
          level:
          label:
      
      # Output final log line
      - output:
          source: message

  # Scrape console logs separately
  - job_name: skynetbot-console
    static_configs:
      - targets:
          - localhost
        labels:
          job: skynetbot-console
          __path__: /var/log/skynetbot/console.skynetbot.log
    
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            label: label
      
      - timestamp:
          source: timestamp
          format: "02-01-2006 15:04:05"
      
      - labels:
          level:
          label:
      
      - output:
          source: message
